<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UNAGI LABYRINTH 1.0.1</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#9ed8ff}canvas{display:block}</style></head><body><canvas id="game"></canvas><script>const c=document.getElementById("game"),ctx=c.getContext("2d");const m=["###############","#S      #     #","# ##### # ### #","# #     #   # #","# # ####### # #","# #       # # #","# ####### # # #","#       # #   #","####### # ### #","#     # #     #","# ### # ##### #","# #   #     # #","# # ####### # #","#         #  G#","###############"];let t=32,ox=0,oy=0;const e={x:0,y:0,a:0,s:2.5,r:8},tar={x:0,y:0},g={x:0,y:0,r:10},walls=[];function build(){walls.length=0;t=Math.floor(Math.min((c.width-40)/15,(c.height-40)/15));ox=(c.width-15*t)/2;oy=(c.height-15*t)/2;for(let y=0;y<15;y++)for(let x=0;x<15;x++){let ch=m[y][x],px=ox+x*t,py=oy+y*t;if(ch=="#")walls.push({x:px,y:py});if(ch=="S"){e.x=px+t/2;e.y=py+t/2;tar.x=e.x;tar.y=e.y;}if(ch=="G"){g.x=px+t/2;g.y=py+t/2;}}}function rs(){c.width=innerWidth;c.height=innerHeight;build()}onresize=rs;c.onmousemove=v=>{tar.x=v.clientX;tar.y=v.clientY};c.ontouchmove=v=>{v.preventDefault();tar.x=v.touches[0].clientX;tar.y=v.touches[0].clientY};function hit(){for(const w of walls){if(e.x+e.r>w.x&&e.x-e.r<w.x+t&&e.y+e.r>w.y&&e.y-e.r<w.y+t)return true;}return false;}function u(){let dx=tar.x-e.x,dy=tar.y-e.y,d=Math.hypot(dx,dy);if(d>1){e.a=Math.atan2(dy,dx);let ox=e.x;e.x+=dx/d*e.s;if(hit())e.x=ox;let oy=e.y;e.y+=dy/d*e.s;if(hit())e.y=oy;}if(Math.hypot(g.x-e.x,g.y-e.y)<g.r+e.r){alert("クリア");build();}}function d(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#355";for(const w of walls)ctx.fillRect(w.x,w.y,t,w?0:0);for(const w of walls)ctx.fillRect(w.x,w.y,t,t);ctx.fillStyle="gold";ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,7);ctx.fill();ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.a);ctx.fillStyle="#643";ctx.beginPath();ctx.ellipse(0,0,t*.45,t*.18,0,0,7);ctx.fill();ctx.restore()}function L(){u();d();requestAnimationFrame(L)}rs();L();</script></body></html>
